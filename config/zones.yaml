zones:
  - name: cooking_zone
    # Optional: override global MOTION_ACTIVE_THRESHOLD for this zone
    motion_active_threshold: 18.0
    polygon:
      # x, y (pixel coordinates) in the original frame
      - [100, 120]
      - [520, 120]
      - [560, 360]
      - [120, 380]
  - name: packing_zone
    motion_active_threshold: 12.0
    polygon:
      - [600, 140]
      - [980, 140]
      - [980, 520]
      - [610, 520]
